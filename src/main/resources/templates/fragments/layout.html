<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Recipe AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

<nav th:fragment="navbar" class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <a href="/" class="text-2xl font-bold bg-gradient-to-r from-emerald-600 to-teal-500 bg-clip-text text-transparent">ChefAI</a>
            </div>
            <div class="flex items-center space-x-4">

                <div sec:authorize="isAnonymous()">
                    <a href="/login" class="text-gray-600 hover:text-emerald-600 font-medium transition px-3 py-2">Login</a>
                    <a href="/register" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-emerald-700 transition shadow-sm">Register</a>
                </div>

                <div sec:authorize="isAuthenticated()" class="flex items-center space-x-4">
                    <a href="/my-recipes" class="text-emerald-600 font-medium hover:text-emerald-700 transition mr-4">My Recipes</a>
                    <span class="text-gray-600 font-medium">Welcome, <span sec:authentication="name"></span></span>
                    <form th:action="@{/logout}" method="post" class="m-0 p-0">
                        <button type="submit" class="text-gray-500 hover:text-red-600 font-medium transition">Logout</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</nav>

</body>
</html>
