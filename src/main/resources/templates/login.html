<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login - ChefAI')}"></head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-emerald-600 to-teal-500 bg-clip-text text-transparent mb-2">Welcome Back</h1>
        <p class="text-gray-500">Sign in to generate recipes</p>
    </div>

    <div th:if="${param.error}" class="bg-red-50 text-red-600 p-3 rounded-lg mb-6 text-sm border border-red-100">
        Invalid username or password.
    </div>
    <div th:if="${param.registered}" class="bg-emerald-50 text-emerald-600 p-3 rounded-lg mb-6 text-sm border border-emerald-100">
        Registration successful! Please login.
    </div>

    <form th:action="@{/login}" method="post" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" name="username" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 p-3 bg-gray-50" required autofocus>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" class="w-full rounded-lg border-gray-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 p-3 bg-gray-50" required>
        </div>
        <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-semibold hover:bg-emerald-700 transition shadow-md">
            Sign In
        </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-600">
        Don't have an account? <a href="/register" class="text-emerald-600 font-semibold hover:underline">Register here</a>
    </p>
</div>
</body>
</html>
